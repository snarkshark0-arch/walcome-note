<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6 Friends Ludo 🎲</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  font-family: 'Comic Sans MS', cursive;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px;
  min-height: 100vh;
}
h1 {
  color: #fff;
  text-shadow: 3px 3px 6px #000;
  margin: 10px 0;
  font-size: 28px;
}
#setup {
  background: #fff;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  margin-bottom: 15px;
}
#board {
  display: grid;
  grid-template-columns: repeat(15, 25px);
  grid-template-rows: repeat(15, 25px);
  gap: 2px;
  background: #333;
  padding: 10px;
  border-radius: 15px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.4);
}
.cell {
  width: 25px;
  height: 25px;
  background: #f0f0f0;
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  position: relative;
}
.home { border-radius: 10px; }
.red-home { background: #ffcccc; }
.green-home { background: #ccffcc; }
.yellow-home { background: #ffffcc; }
.blue-home { background: #ccccff; }
.purple-home { background: #e6ccff; }
.orange-home { background: #ffddcc; }
.safe { background: #ffe066; }
.path { background: #fff; }
.center { background: #ffd700; font-size: 20px; }
.goti {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid #000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  animation: bounce 0.5s;
}
@keyframes bounce {
 0%, 100% { transform: scale(1); }
 50% { transform: scale(1.3); }
}
.red { background: #ff4444; }
.green { background: #44ff44; }
.yellow { background: #ffff44; }
.blue { background: #4444ff; }
.purple { background: #aa44ff; }
.orange { background: #ff8844; }
#dice-box {
  background: #fff;
  padding: 15px;
  border-radius: 15px;
  margin-top: 15px;
  text-align: center;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}
#dice {
  font-size: 60px;
  cursor: pointer;
  transition: transform 0.3s;
}
#dice:hover { transform: scale(1.1) rotate(10deg); }
#dice.rolling { animation: roll 0.5s; }
@keyframes roll {
  0% { transform: rotate(0deg); }
 100% { transform: rotate(360deg); }
}
button {
  background: #ff6b6b;
  color: white;
  border: none;
  padding: 12px 25px;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  margin: 5px;
  font-family: 'Comic Sans MS', cursive;
}
button:hover { background: #ff5252; }
#turn {
  color: #fff;
  font-size: 18px;
  margin: 10px;
  text-shadow: 2px 2px 4px #000;
}
select { padding: 8px; border-radius: 8px; font-size: 16px; }
</style>
</head>
<body>

<h1>🎉 6 Friends Ludo 🎉</h1>

<div id="setup">
  <label>Players: </label>
  <select id="players">
    <option value="4">4 Players 👥</option>
    <option value="5">5 Players 👥👤</option>
    <option value="6">6 Players 👥👥</option>
  </select>
  <button onclick="startGame()">🚀 START GAME</button>
</div>

<div id="turn">Turn: Select players & press START 🎲</div>

<div id="board"></div>

<div id="dice-box">
  <div id="dice" onclick="rollDice()">🎲</div>
  <p>Tap Dice! Current: <span id="diceNum">-</span></p>
</div>

<script>
let board = document.getElementById('board');
let currentPlayer = 0;
let diceValue = 0;
let canMove = false;
let players = 4;
let gotis = {};
let positions = {};
let colors = ['red', 'green', 'yellow', 'blue', 'purple', 'orange'];
let emojis = ['😀','😎','🥳','😍','🤩','😜'];

function startGame() {
  players = parseInt(document.getElementById('players').value);
  document.getElementById('setup').style.display = 'none';
  createBoard();
  initGotis();
  updateTurn();
}

function createBoard() {
  board.innerHTML = '';
  for(let i=0; i<225; i++) {
    let cell = document.createElement('div');
    cell.className = 'cell';
    cell.id = 'c'+i;
    board.appendChild(cell);
  }

  // Homes
  for(let i=0; i<6; i++) {
    for(let j=0; j<6; j++) {
      if(i<2 && j<2) document.getElementById('c'+(i*15+j)).className += ' home red-home';
      if(i<2 && j>12) document.getElementById('c'+(i*15+j)).className += ' home green-home';
      if(i>12 && j<2) document.getElementById('c'+(i*15+j)).className += ' home yellow-home';
      if(i>12 && j>12) document.getElementById('c'+(i*15+j)).className += ' home blue-home';
      if(i>5 && i<9 && j>5 && j<9) document.getElementById('c'+(i*15+j)).className += ' center';
    }
  }

  // Simple path
  let path = [112,113,114,115,116,101,86,71,56,57,58,59,60,75,90,105,120,135,150,149,148,147,146,131,116,101,86,71,56,41,26,27,28,29,30,45,60,75,90,105,120,121,122,123,124,109,94,79,64,49,50,51,52,53,68,83,98,113,128,143,158,157,156,155,154,139,124,109,94,79,64,79,94,109,124,139,140,141,142,143];
  path.forEach(p => {
    if(document.getElementById('c'+p)) document.getElementById('c'+p).className = 'cell path';
  });

  // Safe zones
  [58, 8, 98, 148, 218, 168].forEach(s => {
    if(document.getElementById('c'+s)) document.getElementById('c'+s).className = 'cell safe';
  });
}

function initGotis() {
  for(let p=0; p<players; p++) {
    gotis[p] = [];
    positions[p] = [-1,-1,-1,-1]; // -1 means ghar me
    for(let g=0; g<4; g++) {
      gotis[p][g] = document.createElement('div');
      gotis[p][g].className = 'goti '+colors[p];
      gotis[p][g].innerHTML = emojis[p];
      gotis[p][g].onclick = () => moveGoti(p,g);
      let homePos = p*4 + g;
      document.getElementById('c'+homePos).appendChild(gotis[p][g]);
    }
  }
}

function rollDice() {
  if(canMove) return;
  let dice = document.getElementById('dice');
  dice.className = 'rolling';
  setTimeout(() => {
    diceValue = Math.floor(Math.random()*6)+1;
    dice.innerHTML = ['🎲','1️⃣','2️⃣','3️⃣','4️⃣','5️⃣','6️⃣'][diceValue];
    document.getElementById('diceNum').innerText = diceValue;
    dice.className = '';
    canMove = true;
    checkMoves();
  }, 500);
}

function checkMoves() {
  let hasMove = false;
  for(let g=0; g<4; g++) {
    if(positions[currentPlayer][g] == -1 && diceValue == 6) hasMove = true;
    if(positions[currentPlayer][g] >= 0) hasMove = true;
  }
  if(!hasMove) nextTurn();
}

function moveGoti(p,g) {
  if(p!= currentPlayer ||!canMove) return;

  if(positions[p][g] == -1) {
    if(diceValue == 6) {
      positions[p][g] = 0;
      updateBoard();
      canMove = false;
      if(diceValue!= 6) nextTurn();
    }
  } else {
    positions[p][g] += diceValue;
    if(positions[p][g] > 52) positions[p][g] = 52;
    updateBoard();
    canMove = false;

    if(checkWin(p)) {
      alert('🎉 Player '+colors[p].toUpperCase()+' JEET GAYA! 🏆');
      location.reload();
    }
    if(diceValue!= 6) nextTurn();
  }
}

function updateBoard() {
  document.querySelectorAll('.cell').forEach(c => {
    c.querySelectorAll('.goti').forEach(g => g.remove());
  });

  for(let p=0; p<players; p++) {
    for(let g=0; g<4; g++) {
      let pos = positions[p][g];
      if(pos >= 0) {
        let cellId = 112 + pos; // simple path
        if(cellId < 225) document.getElementById('c'+cellId).appendChild(gotis[p][g]);
      } else {
        let homePos = p*4 + g;
        document.getElementById('c'+homePos).appendChild(gotis[p][g]);
      }
    }
  }
}

function nextTurn() {
  currentPlayer = (currentPlayer + 1) % players;
  diceValue = 0;
  canMove = false;
  document.getElementById('diceNum').innerText = '-';
  document.getElementById('dice').innerHTML = '🎲';
  updateTurn();
}

function updateTurn() {
  document.getElementById('turn').innerHTML =
    `🎯 Turn: <span style="color:${colors[currentPlayer]}">${colors[currentPlayer].toUpperCase()} ${emojis[currentPlayer]}</span> ka hai`;
}

function checkWin(p) {
  return positions[p].every(pos => pos >= 52);
}
</script>

</body>
</html>
