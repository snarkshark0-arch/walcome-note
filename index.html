<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 Ludo Star · 2-4 Players</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #0f0c29, #1a1a3e, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 1rem;
        }
        .game-wrapper {
            background: #1e1e3f;
            border-radius: 3rem;
            padding: 2rem 2rem 2.2rem;
            max-width: 750px;
            width: 100%;
            box-shadow: 0 30px 50px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,255,255,0.06);
            border: 1px solid #4a4a7a;
        }
        .ludo-title {
            text-align: center;
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: #f7e05e;
            text-shadow: 0 0 20px #f7b32b, 0 4px 0 #7a5a1a;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .ludo-title small {
            font-size: 1rem;
            background: #2a2a5a;
            padding: 0.2rem 1.6rem;
            border-radius: 60px;
            color: #c8c8ff;
            letter-spacing: 2px;
            box-shadow: inset 0 -3px 0 #111133;
        }
        .player-indicators {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin: 0.8rem 0 1.2rem;
        }
        .player-indicators span {
            background: #2c2c5e;
            padding: 0.25rem 1.2rem;
            border-radius: 60px;
            color: #cfd0ff;
            font-weight: 500;
            font-size: 0.9rem;
            border: 1px solid #555599;
        }
        .ludo-board {
            background: #0f0f2a;
            border-radius: 2.4rem;
            padding: 1.8rem 1rem;
            box-shadow: inset 0 8px 20px #000000aa;
            border: 2px solid #4a4a7a;
            margin: 0.8rem 0 1.2rem;
        }
        .status-area {
            background: #141436;
            border-radius: 60px;
            padding: 0.7rem 1.6rem;
            text-align: center;
            color: #eaeaff;
            font-weight: 500;
            min-height: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid #4f4f86;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .status-area .turn-badge {
            background: #2d2d70;
            padding: 0.2rem 1.3rem;
            border-radius: 60px;
            color: #ffd966;
            font-weight: 600;
        }
        .dice-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }
        .dice-display {
            font-size: 4.2rem;
            background: #0b0b22;
            padding: 0.2rem 2rem;
            border-radius: 30px;
            border: 2px solid #5a5a9a;
            min-width: 120px;
            text-align: center;
            box-shadow: inset 0 -6px 0 #222255;
            line-height: 1.2;
            color: #ffffff;
        }
        .dice-btn {
            background: #f7c948;
            border: none;
            font-size: 1.3rem;
            font-weight: 700;
            padding: 0.7rem 2.8rem;
            border-radius: 60px;
            color: #1a1a3a;
            box-shadow: 0 7px 0 #8a6f2a, 0 6px 18px #00000077;
            transition: 0.06s linear;
            cursor: pointer;
            letter-spacing: 1px;
            border: 1px solid #fadd7a;
        }
        .dice-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #6a551f;
        }
        .dice-btn:disabled {
            opacity: 0.4;
            transform: translateY(5px);
            box-shadow: 0 2px 0 #6a551f;
            pointer-events: none;
        }
        .score-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
            margin-top: 1.8rem;
            text-align: center;
        }
        .score-item {
            background: #1a1a44;
            border-radius: 30px;
            padding: 0.5rem 0.2rem;
            border: 1px solid #4f4f86;
            color: #d0d5ff;
            font-weight: 500;
        }
        .score-item .score-num {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffdb7c;
        }
        .reset-btn {
            background: #3a3a7a;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.6rem 2.2rem;
            border-radius: 60px;
            font-size: 1rem;
            box-shadow: 0 6px 0 #1a1a44;
            transition: 0.06s linear;
            cursor: pointer;
            border: 1px solid #6a6aaa;
            margin-top: 0.8rem;
        }
        .reset-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1a1a44;
        }
        .footer-msg {
            margin-top: 0.6rem;
            font-size: 0.85rem;
            color: #9a9acf;
            text-align: center;
        }
        @media (max-width: 480px) {
            .ludo-title { font-size: 1.8rem; }
            .dice-display { font-size: 3rem; min-width: 80px; }
            .score-grid { gap: 0.4rem; }
        }
        /* Ludo Star intro text */
        .intro-text {
            background: #151538;
            border-radius: 60px;
            padding: 0.8rem 1.5rem;
            color: #f7e05e;
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 3px;
            text-shadow: 0 0 12px #f7b32b66;
            border: 1px solid #f7b32b55;
            text-align: center;
            margin-bottom: 1rem;
        }
        .intro-text span {
            color: #ffffff;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .winner-highlight {
            background: #f7b32b33;
            border: 1px solid #f7b32b;
            border-radius: 60px;
            padding: 0.1rem 1.2rem;
            color: #f7e05e;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <!-- Ludo Star Title + intro -->
    <div class="ludo-title">
        ⭐ LUDO STAR
        <small>2-4 players</small>
    </div>

    <!-- Player indicators -->
    <div class="player-indicators">
        <span style="border-color:#ff6b6b;">🔴 P1</span>
        <span style="border-color:#4ecdc4;">🟢 P2</span>
        <span style="border-color:#ffe66d;">🟡 P3</span>
        <span style="border-color:#4d9eff;">🔵 P4</span>
    </div>

    <div class="ludo-board">
        <!-- Intro / Ludo Star message -->
        <div class="intro-text">
            ⭐ Ludo Star ⭐ <span>— roll &amp; race!</span>
        </div>

        <!-- Status -->
        <div class="status-area" id="statusArea">
            <span class="turn-badge" id="turnBadge">🎯 Player 1</span>
            <span id="statusMessage">Roll the dice to start!</span>
        </div>

        <!-- Dice + actions -->
        <div class="dice-area">
            <div class="dice-display" id="diceDisplay">⚀</div>
            <button class="dice-btn" id="rollDiceBtn">🎲 ROLL DICE</button>
        </div>

        <!-- Score / position grid -->
        <div class="score-grid" id="scoreGrid">
            <div class="score-item">🔴 P1 <div class="score-num" id="score0">0</div></div>
            <div class="score-item">🟢 P2 <div class="score-num" id="score1">0</div></div>
            <div class="score-item">🟡 P3 <div class="score-num" id="score2">0</div></div>
            <div class="score-item">🔵 P4 <div class="score-num" id="score3">0</div></div>
        </div>

        <!-- Reset button -->
        <div style="display: flex; justify-content: center;">
            <button class="reset-btn" id="resetGameBtn">🔄 New Game</button>
        </div>
        <div class="footer-msg">⭐ First to reach 20 wins the Ludo Star!</div>
    </div>
</div>

<script>
    (function LudoStarGame() {
        // -------------------- CONFIG --------------------
        const WIN_SCORE = 20;
        const PLAYER_COUNT = 4;

        // -------------------- STATE --------------------
        let state = {
            scores: [0, 0, 0, 0],
            turn: 0,               // 0,1,2,3
            roundActive: true,
            gameOver: false,
            diceValue: 1,
            waitingForRoll: true,  // true = player must roll
            lastRoll: 0,
        };

        // DOM refs
        const diceDisplay = document.getElementById('diceDisplay');
        const rollBtn = document.getElementById('rollDiceBtn');
        const resetBtn = document.getElementById('resetGameBtn');
        const turnBadge = document.getElementById('turnBadge');
        const statusMsg = document.getElementById('statusMessage');
        const scoreEls = [
            document.getElementById('score0'),
            document.getElementById('score1'),
            document.getElementById('score2'),
            document.getElementById('score3')
        ];

        // Dice faces (Unicode)
        const DICE_FACES = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

        // -------------------- HELPERS --------------------
        function updateUI() {
            // update scores
            for (let i = 0; i < PLAYER_COUNT; i++) {
                scoreEls[i].textContent = state.scores[i];
            }
            // turn badge
            const p = state.turn + 1;
            turnBadge.textContent = `🎯 Player ${p}`;
            // dice
            diceDisplay.textContent = DICE_FACES[state.diceValue - 1] || '⚀';

            // status message based on game state
            if (state.gameOver) {
                const winnerIdx = state.scores.findIndex(s => s >= WIN_SCORE);
                if (winnerIdx !== -1) {
                    statusMsg.innerHTML = `🏆 <span class="winner-highlight">Player ${winnerIdx+1} WINS LUDO STAR!</span> 🏆`;
                } else {
                    statusMsg.textContent = '🏁 Game Over · Press New Game';
                }
                rollBtn.disabled = true;
                return;
            }

            if (!state.roundActive) {
                statusMsg.textContent = '⏳ Round over · press ROLL to continue';
                rollBtn.disabled = false;
                return;
            }

            // normal turn
            if (state.waitingForRoll) {
                statusMsg.textContent = `🎲 Player ${p}, roll the dice!`;
                rollBtn.disabled = false;
            } else {
                statusMsg.textContent = `⏳ Waiting for roll...`;
                rollBtn.disabled = true;
            }
        }

        // Check if any player reached win score
        function checkGameOver() {
            const winner = state.scores.findIndex(s => s >= WIN_SCORE);
            if (winner !== -1) {
                state.gameOver = true;
                state.roundActive = false;
                updateUI();
                return true;
            }
            return false;
        }

        // Advance to next player (skip if game over)
        function nextTurn() {
            if (state.gameOver) return;
            // move to next player (cyclic)
            state.turn = (state.turn + 1) % PLAYER_COUNT;
            state.waitingForRoll = true;
            state.roundActive = true;
            updateUI();
        }

        // -------------------- CORE: ROLL DICE --------------------
        function handleRoll() {
            // Validation
            if (state.gameOver) {
                statusMsg.textContent = '🏁 Game is over, press New Game';
                return;
            }
            if (!state.roundActive) {
                // start new round
                state.roundActive = true;
                state.waitingForRoll = true;
                updateUI();
                return;
            }
            if (!state.waitingForRoll) {
                statusMsg.textContent = '⏳ Wait for your turn';
                return;
            }

            // Roll dice (1-6)
            const roll = Math.floor(Math.random() * 6) + 1;
            state.diceValue = roll;
            state.lastRoll = roll;

            // Add to current player's score
            const currentPlayer = state.turn;
            state.scores[currentPlayer] += roll;

            // Update dice display
            diceDisplay.textContent = DICE_FACES[roll - 1];

            // Check win condition
            if (checkGameOver()) {
                // game over, update UI
                updateUI();
                return;
            }

            // Feedback
            statusMsg.textContent = `🎲 Player ${currentPlayer+1} rolled ${roll} · +${roll} points!`;

            // Mark that player has rolled this turn
            state.waitingForRoll = false;
            // update scores
            scoreEls[currentPlayer].textContent = state.scores[currentPlayer];

            // After roll, automatically advance turn after short delay (better UX)
            // But we want player to see the roll, then next turn.
            // We'll set a small timeout to advance.
            rollBtn.disabled = true; // disable during delay

            setTimeout(() => {
                // but check if game ended during timeout (should not)
                if (state.gameOver) {
                    updateUI();
                    return;
                }
                // advance to next player
                nextTurn();
                // re-enable roll (if not gameover)
                if (!state.gameOver) {
                    rollBtn.disabled = false;
                }
                updateUI();
            }, 600);
        }

        // -------------------- RESET GAME --------------------
        function resetGame() {
            state.scores = [0, 0, 0, 0];
            state.turn = 0;
            state.roundActive = true;
            state.gameOver = false;
            state.waitingForRoll = true;
            state.diceValue = 1;
            state.lastRoll = 0;

            // reset UI
            for (let i = 0; i < PLAYER_COUNT; i++) {
                scoreEls[i].textContent = '0';
            }
            diceDisplay.textContent = '⚀';
            rollBtn.disabled = false;
            updateUI();
            statusMsg.textContent = '🔄 New game! Player 1 starts.';
            turnBadge.textContent = '🎯 Player 1';
        }

        // -------------------- EVENT LISTENERS --------------------
        rollBtn.addEventListener('click', handleRoll);
        resetBtn.addEventListener('click', resetGame);

        // -------------------- INIT --------------------
        resetGame();

        // extra: if only 2 or 3 players, we still support 4 slots, but it's fine
        // we can add a tiny note
        console.log('⭐ Ludo Star · 2-4 players · first to 20 wins');
    })();
</script>
</body>
</html>
